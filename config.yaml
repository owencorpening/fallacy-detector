stt:
  provider: whisper-local
  model_size: tiny   # tiny | base | small | medium | large

llm:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  api_key: ${ANTHROPIC_API_KEY}

pipeline:
  chunk_seconds: 5
  context_window: 3   # number of previous chunks included in LLM context
  sample_rate: 16000
